name = "cf-ai-agentguard"
main = "src/index.ts"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2026-03-01"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "AGENT", class_name = "PolicyGuardAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PolicyGuardAgent"]

[assets]
directory = "./dist/frontend"
not_found_handling = "single-page-application"
